{% extends 'django_forms_workflows/base.html' %}

{% block title %}Password Reset Complete - {{ site_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 p-md-5 text-center">
        <i class="bi bi-check-circle display-4 text-success mb-3"></i>
        <h2 class="fw-bold">Password reset complete</h2>
        <p class="text-muted mb-4">Your password has been set. You can now sign in.</p>
        <a href="{% url 'login' %}" class="btn btn-primary">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
