repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy .
        language: python
        additional_dependencies:
          - mypy==2.3.0
          - django-stubs==6.0.7
          - Django==6.0.5
          - django-guardian==3.3.2
          - django-treebeard==5.3.0
          - django-forms-workflows==0.76.0
          - django-countries==9.0.0
          - django-crispy-forms==2.6
          - django-nested-admin==4.1.6
          - python-decouple==3.8
        pass_filenames: false
