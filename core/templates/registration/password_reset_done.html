{% extends 'django_forms_workflows/base.html' %}

{% block title %}Reset Password - {{ site_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 p-md-5 text-center">
        <i class="bi bi-envelope-check display-4 text-success mb-3"></i>
        <h2 class="fw-bold">Check your email</h2>
        <p class="text-muted mb-0">
          If an account exists with that email address, we've sent instructions
          for resetting your password.
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
